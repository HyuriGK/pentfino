<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pentfino | Agendamento Inteligente</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="booking-page-wrapper">
        <!-- Visual Sidebar -->
        <div class="booking-sidebar">
            <div class="booking-sidebar-content">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    Pentfino
                </div>
                <div id="booking-summary-sidebar" class="booking-summary-box">
                    <h2 class="sidebar-hero-title">Prepare-se para o seu melhor visual.</h2>
                    <p class="sidebar-desc">Selecione o serviço e o horário ideal para você.</p>
                    
                    <div id="active-booking-summary" class="hidden">
                        <div class="summary-item">
                            <span class="label">Serviço</span>
                            <span id="summary-service-name" class="value">--</span>
                        </div>
                        <div class="summary-item">
                            <span class="label">Horário</span>
                            <span id="summary-time-val" class="value">--</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="sidebar-overlay"></div>
        </div>

        <!-- Interactive Content -->
        <main class="booking-main">
            <div id="step-services" class="step-container">
                <div class="step-header">
                    <span class="step-count">Passo 01/02</span>
                    <h2 class="step-title">Escolha o Serviço</h2>
                </div>
                <div class="card-grid-custom" id="services-list">
                    <!-- Services injected by JS -->
                </div>
                <div class="step-footer">
                    <button class="btn btn-primary btn-large" id="btn-next-step" disabled>Próximo Passo</button>
                </div>
            </div>

            <section id="step-details" class="step-container hidden">
                <div class="step-header">
                    <span class="step-count">Passo 02/02</span>
                    <h2 class="step-title">Horário & Dados</h2>
                </div>
                
                <div class="details-layout">
                    <div class="time-selection">
                        <label class="input-label-mini">Escolha o Dia</label>
                        <div class="input-group-modern" style="margin-bottom: 2rem;">
                            <input type="date" id="booking-date" style="background: transparent; border: none; border-bottom: 1px solid var(--border); color: #fff; width: 100%; padding: 10px 0;">
                        </div>

                        <label class="input-label-mini">Horários Disponíveis</label>
                        <div class="time-grid-mini" id="times-list">
                            <!-- Times injected by JS -->
                        </div>
                    </div>
                    
                    <div class="user-data-form">
                        <label class="input-label-mini">Seus Dados</label>
                        <div class="input-group-modern">
                            <input type="text" id="client-name" placeholder="Seu Nome">
                        </div>
                        <div class="input-group-modern">
                            <input type="tel" id="client-phone" placeholder="Seu WhatsApp">
                        </div>
                    </div>
                </div>

                <div class="step-footer-dual">
                    <button class="btn btn-ghost" onclick="app.showStep('services')">Voltar</button>
                    <button class="btn btn-primary btn-large" id="btn-confirm-booking">Confirmar Agora</button>
                </div>
            </section>

            <section id="step-success" class="step-container hidden">
                <div class="success-screen">
                    <div class="success-icon">✓</div>
                    <h2 class="success-title">Tudo Pronto!</h2>
                    <p class="success-desc">Seu agendamento foi confirmado com sucesso.</p>
                    <div class="success-card glass">
                        <div id="summary-content"></div>
                    </div>
                    <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 2rem;">Novo Agendamento</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Notification Toast (Simulation) -->
    <div id="toast" class="retention-toast hidden">
        <div style="font-size: 1.2rem;">⚡</div>
        <div>
            <strong style="display: block; font-size: 0.85rem;">Novo Lembrete</strong>
            <span id="toast-msg" style="font-size: 0.75rem; opacity: 0.9;"></span>
        </div>
    </div>

    <script src="customer.js"></script>
</body>
</html>
